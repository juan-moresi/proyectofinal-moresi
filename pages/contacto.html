    <!-- FORMULARIO CONTACTO -->

    <!-- nuevo formulario de contacto -->

    <div class="contact-form">
        <h2>Contacto</h2>
        <form action="#" method="post">
            <div class="form-group">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>
            <div class="form-group">
                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="opcion">Seleccionar País</label>
                <select id="opcion" name="opcion" required>
                    <option value="" disabled selected>PAÍS</option>
                    <option value="1">Argentina</option>
                    <option value="2">Brasil</option>
                    <option value="3">Chile</option>
                    <option value="">Perú</opt>
                </select>
            </div>
            <div class="form-group">
                <label for="opcion">Seleccionar Artista</label>
                <select id="opcion" name="opcion" required>
                    <option value="" disabled selected>ARTISTA</option>
                    <option value="1">UNPROVEN</option>
                    <option value="2">PREDATOR</option>
                    <option value="3">ANIME</option>
                </select>
            </div>
            <div class="form-group">
                <label for="asunto">Asunto:</label>
                <input type="text" id="asunto" name="asunto" required>
            </div>
            <div class="form-group">
                <label for="mensaje">Mensaje:</label>
                <textarea id="mensaje" name="mensaje" rows="5" required></textarea>
            </div>
            <button class="button-form" type="submit">Enviar</button>
        </form>
    </div>
